{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolidGoggles</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<style>
    * {
        font-family: 'Inter';
    }
</style>
</head>
<body class="flex min-h-screen bg-gray-100">

    <!-- Sidebar -->
    <aside class="w-64 bg-orange-800 text-white flex flex-col">
        <!-- Logo + App Name -->
        <div class="flex items-center p-6 gap-3">
            <img src="{% static 'core/logo.jpg' %}" alt="Logo" class="h-10 w-10 rounded-md">
            <span class="text-2xl font-bold">SolidGoggles</span>
        </div>

        <nav class="flex-1">
            <ul>
                <li class="px-6 py-3 hover:bg-orange-700 cursor-pointer"><a href="{% url 'home' %}">Home</a></li>
                <li class="px-6 py-3 bg-red-700 cursor-pointer"><a href="">Log Out</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
