{% extends 'base.html' %}

{% block content %}
    <h1 class="text-3xl font-bold mb-2">Welcome, {{ user }}!</h1>
    <h2 class="text-xl text-gray-500 font-semibold mb-4">Available Consultations</h2>

    <div class="flex flex-col">
        {% for c in consultations %}
            <div class="border border-green-500 p-6 w-full flex flex-col items-center max-w-[450px] rounded-md mb-4 shadow-2xl">
                <h1 class="text-3xl font-serif font-bold mb-3">{{ c.teacher_name }}</h1>
                <p class="mb-2 text-gray-500 text-xl">Subject: {{ c.subject }}</p>
                <p class="text-2xl font-semibold">{{ c.class_name }}</p>

                <a class="text-white bg-blue-500 mt-2 p-2 rounded-md" href="">Book</a>
            </div>
        {% endfor %}
    </div>
{% endblock %}
