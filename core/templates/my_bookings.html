{% extends 'base.html' %}

{% block content %}
    <h1 class="text-3xl font-bold text-gray-500 mb-6">My Bookings</h1>

    <div class="flex flex-col">
        {% for b in bookings %}
            <div class="border border-green-500 p-6 w-full flex flex-col items-center max-w-[450px] rounded-md mb-4 shadow-2xl">
                <h1 class="text-3xl font-serif font-bold mb-2">{{ b.consultation.teacher_name }}</h1>
                <p class="font-semibold text-gray-500 mb-4">Subject: {{ b.consultation.subject }}</p>
                <p class="text-2xl font-semibold mb-4">{{ b.consultation.class_name }}</p>
                <p class="text-3xl font-semibold mb-2">Consultation date: {{ b.consultation.date }}</p>
                <a href="{% url 'delete' b.pk %}" class="bg-red-800 p-2 rounded-md text-white">Delete Booking</a>
            </div>
        {% endfor %}
    </div>
{% endblock %}
